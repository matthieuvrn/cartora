version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      react-and-next:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "next-intl"
          - "@types/react*"
      data-and-observability:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "@prisma/*"
          - "prisma"
          - "@supabase/*"
          - "@sentry/*"
          - "@upstash/*"
          - "stripe"
      ui-and-runtime:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "@iconify*"
          - "lucide-react"
          - "radix-ui"
          - "recharts"
          - "geist"
          - "class-variance-authority"
          - "clsx"
          - "qrcode"
          - "tailwind-merge"
          - "zod"
      test-and-quality:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "@types/*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "dotenv"
      styling-and-ui-tooling:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
          - "shadcn"
      minor-and-patch-misc:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "next-intl"
          - "@types/react*"
          - "@prisma/*"
          - "prisma"
          - "@supabase/*"
          - "@sentry/*"
          - "@upstash/*"
          - "stripe"
          - "@iconify*"
          - "lucide-react"
          - "radix-ui"
          - "recharts"
          - "geist"
          - "class-variance-authority"
          - "clsx"
          - "qrcode"
          - "tailwind-merge"
          - "zod"
          - "@types/*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "dotenv"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
          - "shadcn"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
